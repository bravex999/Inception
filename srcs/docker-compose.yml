services:
  mariadb:
    image: mariadb:inception
    build: requirements/mariadb
    env_file: .env
    restart: always
    networks: [inception]
    volumes:
      - mariadb_data:/var/lib/mysql

  wordpress:
    image: wordpress:inception
    build: requirements/wordpress
    env_file: .env
    restart: always
    networks: [inception]
    depends_on: [mariadb]
    volumes:
      - wordpress_data:/var/www/html

  nginx:
    image: nginx:inception
    build: requirements/nginx
    env_file: .env
    restart: always
    networks: [inception]
    depends_on: [wordpress]
    ports:
      - "443:443"
    volumes:
      - wordpress_data:/var/www/html

volumes:
  mariadb_data:
    driver: local
    driver_opts:
      type: none
      o: bind
      device: /home/chnaranj/data/mariadb
  wordpress_data:
    driver: local
    driver_opts:
      type: none
      o: bind
      device: /home/chnaranj/data/wordpress

networks:
  inception:
    driver: bridge
